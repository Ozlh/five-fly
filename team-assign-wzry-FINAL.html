<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者荣耀 · 战队分路系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #121214;
            --bg-tertiary: #1a1a1c;
            --bg-elevated: #232326;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --accent-gold: #f59e0b;
            --accent-gold-hover: #d97706;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-default: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
            --shadow-gold: 0 0 20px rgba(245, 158, 11, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.3));
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Sync Status */
        .sync-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-default);
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        /* Main Card */
        .main-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-header {
            padding: 24px 24px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Assignments Grid */
        .assignments-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding: 24px;
        }

        @media (max-width: 640px) {
            .assignments-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .assignment-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .assignment-item:hover {
            border-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.1);
        }

        .assignment-position {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .assignment-player {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Password Section */
        .password-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 20px;
            padding: 28px;
            max-width: 400px;
            margin: 0 auto 24px;
            text-align: center;
        }

        .password-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .password-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 500;
            border: 1px solid var(--border-default);
            border-radius: 12px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .password-input::placeholder {
            color: var(--text-tertiary);
            letter-spacing: normal;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--accent-gold);
            color: #000;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .btn-primary:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .lock-status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .lock-status.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .lock-status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* Hidden content */
        .hidden-content {
            display: none;
            margin-bottom: 24px;
        }

        /* Season Info */
        .season-card {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .season-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .season-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        .season-text h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 2px;
        }

        .season-text p {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .season-countdown {
            text-align: right;
        }

        .countdown-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .countdown-time {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        /* Hero Rankings */
        .rankings-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .rankings-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-default);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .rankings-tabs::-webkit-scrollbar {
            display: none;
        }

        .ranking-tab {
            flex: 1;
            min-width: 80px;
            padding: 16px 12px;
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
        }

        .ranking-tab:hover {
            color: var(--text-secondary);
            background: var(--bg-tertiary);
        }

        .ranking-tab.active {
            color: var(--accent-gold);
            background: rgba(245, 158, 11, 0.1);
        }

        .ranking-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gold);
        }

        .rankings-content {
            padding: 20px;
        }

        .rankings-list {
            display: none;
        }

        .rankings-list.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .ranking-item:hover {
            background: var(--bg-elevated);
            transform: translateX(4px);
        }

        .ranking-item:last-child {
            margin-bottom: 0;
        }

        .ranking-number {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .ranking-number.top1 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }

        .ranking-number.top2 {
            background: linear-gradient(135deg, #C0C0C0 0%, #A0A0A0 100%);
            color: #000;
        }

        .ranking-number.top3 {
            background: linear-gradient(135deg, #CD7F32 0%, #A0522D 100%);
            color: #fff;
        }

        .ranking-number.normal {
            background: var(--bg-elevated);
            color: var(--text-tertiary);
        }

        .ranking-hero {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-avatar {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--border-default);
        }

        .hero-info h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .hero-info p {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .ranking-stats {
            text-align: right;
        }

        .win-rate {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .pick-rate {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        .rankings-note {
            text-align: center;
            padding: 16px;
            border-top: 1px solid var(--border-default);
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* Force Notice */
        .force-notice {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(239, 68, 68, 0.05) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
        }

        .force-notice-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #ef4444;
            margin-bottom: 8px;
        }

        .force-notice p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .next-assign-time {
            font-size: 32px;
            font-weight: 700;
            color: #ef4444;
            font-variant-numeric: tabular-nums;
        }

        /* Countdown Display */
        .countdown-display {
            position: fixed;
            top: 24px;
            right: 24px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-default);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            z-index: 100;
            display: none;
        }

        .countdown-display.show {
            display: block;
        }

        .countdown-display span {
            color: var(--accent-gold);
            font-variant-numeric: tabular-nums;
        }

        .hidden-content.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-large {
            padding: 18px 48px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-bar.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .status-bar.success { border-color: rgba(34, 197, 94, 0.5); }
        .status-bar.error { border-color: rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🏆</div>
            <h1>王者荣耀 · 战队分路系统</h1>
            <p>实时同步 · 所有人看到相同结果</p>
        </div>

        <!-- 当前分路情况 -->
        <div class="main-card">
            <div class="card-header">
                <div class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-gold);">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    当前分路情况
                </div>
                <div class="live-badge">
                    <span class="live-dot"></span>
                    实时同步
                </div>
            </div>

            <div class="assignments-grid" id="assignmentGrid">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 密码输入区域 -->
        <div class="password-section" id="passwordSection">
            <div class="password-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                输入密码解锁控制面板
            </div>

            <input type="password" class="password-input" id="passwordInput" placeholder="请输入密码">

            <button class="btn-primary" onclick="verifyPassword()">解锁控制面板</button>

            <div class="lock-status" id="lockStatus"></div>
        </div>

        <!-- 强制分配提示 -->
        <div class="force-notice" id="forceNotice">
            <div class="force-notice-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                系统锁定中
            </div>
            <p>当前未解锁控制面板，系统每5分钟自动重新随机分配</p>
            <div class="next-assign-time" id="nextAssignTime">--:--</div>
        </div>

        <!-- 隐藏内容（解锁后显示） -->
        <div class="hidden-content" id="hiddenContent">
            <button class="btn-large" onclick="manualReassign()">立即重新分配</button>
        </div>
    </div>

    <!-- 倒计时显示 -->
    <div class="countdown-display" id="countdownDisplay"></div>

    <!-- 状态提示 -->
    <div class="status-bar" id="statusBar"></div>

    <script>
        // Firebase 配置 - 请填入你的配置
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://funny-5560f-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 初始化 Firebase
        let app, database, assignmentsRef;
        let isConnected = false;

        try {
            app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            assignmentsRef = database.ref('wzry-assignments');
            isConnected = true;
            console.log('Firebase connected');
        } catch (e) {
            console.log('Firebase not configured, using local mode');
        }

        // 数据
        const players = ['刚哥', '小茹', '毛裤', 'zoe', '超超'];
        const positions = ['打野', '对抗路', '中路', '发育路', '游走'];
        let assignments = {};
        let isUnlocked = false;
        let autoAssignInterval = null;
        let countdownInterval = null;
        let nextAssignTime = null;

        // 从 localStorage 加载分配
        function loadAssignmentsFromStorage() {
            try {
                const saved = localStorage.getItem('wzry-assignments');
                if (saved) {
                    const data = JSON.parse(saved);
                    // 检查是否过期（12小时）
                    if (data.timestamp && (Date.now() - data.timestamp) < 12 * 60 * 60 * 1000) {
                        return data.assignments;
                    }
                }
            } catch (e) {
                console.log('localStorage 读取失败');
            }
            return null;
        }

        // 保存分配到 localStorage
        function saveAssignmentsToStorage() {
            try {
                const data = {
                    assignments: assignments,
                    timestamp: Date.now()
                };
                localStorage.setItem('wzry-assignments', JSON.stringify(data));
            } catch (e) {
                console.log('localStorage 保存失败');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 先尝试从 localStorage 加载
            const savedAssignments = loadAssignmentsFromStorage();

            if (isConnected) {
                // 监听 Firebase 数据变化
                assignmentsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        assignments = data;
                        updateDisplay();
                        saveAssignmentsToStorage();
                    }
                });
            }

            // 检查是否有本地保存的分配
            const hasLocalData = savedAssignments && Object.keys(savedAssignments).length === 5;

            if (hasLocalData) {
                // 使用本地保存的分配
                assignments = savedAssignments;
                updateDisplay();
                // 同步到 Firebase（如果连接了）
                saveToServer();
            } else if (!isConnected) {
                // 没有本地数据且未连接 Firebase，生成新的
                generateRandomAssignments();
            }
            // 如果连接了 Firebase 但没有本地数据，等待 Firebase 数据回调

            startForceAutoAssign(hasLocalData);
        });

        // 生成随机分配
        function generateRandomAssignments() {
            const shuffled = [...players].sort(() => Math.random() - 0.5);
            assignments = {};
            positions.forEach((pos, idx) => {
                assignments[pos] = shuffled[idx];
            });
            updateDisplay();
            saveToServer();
            saveAssignmentsToStorage();
        }

        // 更新显示
        function updateDisplay() {
            const grid = document.getElementById('assignmentGrid');
            grid.innerHTML = '';

            positions.forEach(pos => {
                const player = assignments[pos] || '-';
                const item = document.createElement('div');
                item.className = 'assignment-item';
                item.innerHTML = `
                    <div class="assignment-position">${pos}</div>
                    <div class="assignment-player">${player}</div>
                `;
                grid.appendChild(item);
            });
        }

        // 保存到服务器
        function saveToServer() {
            if (isConnected && assignmentsRef) {
                assignmentsRef.set(assignments);
            }
        }

        // 验证密码
        function verifyPassword() {
            const input = document.getElementById('passwordInput');
            const status = document.getElementById('lockStatus');
            const password = input.value.trim();

            if (password === '520zoe') {
                isUnlocked = true;
                input.disabled = true;
                status.textContent = '密码正确，控制面板已解锁';
                status.className = 'lock-status success';
                document.getElementById('hiddenContent').classList.add('show');
                document.getElementById('forceNotice').style.display = 'none';
                stopForceAutoAssign();
                showStatus('解锁成功', 'success');
            } else {
                input.value = '';
                status.textContent = '密码错误';
                status.className = 'lock-status error';
                showStatus('密码错误', 'error');
            }
        }

        // 强制自动分配
        function startForceAutoAssign(skipImmediateReassign = false) {
            // 如果已经有完整分配数据，不再立即重新分配
            if (!skipImmediateReassign && Object.keys(assignments).length !== 5) {
                forceReassign();
            }
            // 设置定时器，5分钟后才进行下一次分配
            autoAssignInterval = setInterval(forceReassign, 5 * 60 * 1000);
            nextAssignTime = Date.now() + 5 * 60 * 1000;
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function stopForceAutoAssign() {
            if (autoAssignInterval) {
                clearInterval(autoAssignInterval);
                autoAssignInterval = null;
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            document.getElementById('countdownDisplay').style.display = 'none';
        }

        function forceReassign() {
            const shuffled = [...players].sort(() => Math.random() - 0.5);
            assignments = {};
            positions.forEach((pos, idx) => {
                assignments[pos] = shuffled[idx];
            });
            updateDisplay();
            saveToServer();
            saveAssignmentsToStorage();
            showStatus('已重新分配', 'success');
            nextAssignTime = Date.now() + 5 * 60 * 1000;
        }

        function manualReassign() {
            if (!isUnlocked) {
                showStatus('请先解锁', 'error');
                return;
            }
            forceReassign();
        }

        function updateCountdown() {
            if (!nextAssignTime) return;
            const diff = nextAssignTime - Date.now();
            if (diff <= 0) return;
            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            const timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('nextAssignTime').textContent = timeStr;
        }

        function showStatus(message, type) {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.className = 'status-bar show ' + type;
            setTimeout(() => bar.classList.remove('show'), 3000);
        }

        // 渲染英雄排行榜
        function renderHeroRankings() {
            Object.keys(heroRankings).forEach(position => {
                const container = document.getElementById(`${position}-rankings`);
                if (!container) return;

                const heroes = heroRankings[position];
                container.innerHTML = heroes.map((hero, index) => `
                    <div class="ranking-item">
                        <div class="ranking-number ${index < 3 ? 'top' + (index + 1) : 'normal'}">${index + 1}</div>
                        <div class="ranking-hero">
                            <img src="${hero.avatar}" alt="${hero.name}" class="hero-avatar" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2244%22 height=%2244%22%3E%3Crect fill=%22%23333%22 width=%2244%22 height=%2244%22/%3E%3Ctext fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2212%22%3E${hero.name.charAt(0)}%3C/text%3E%3C/svg%3E'">

                `).join('');
            });
        }

        // 切换排行榜标签
        function initRankingTabs() {
            const tabs = document.querySelectorAll('.ranking-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // 切换标签状态
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // 切换内容
                    const position = tab.dataset.position;
                    document.querySelectorAll('.rankings-list').forEach(list => {
                        list.classList.remove('active');
                    });
                    document.getElementById(`${position}-rankings`).classList.add('active');
                });
            });
        }

        // Enter键提交
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'passwordInput') {
                verifyPassword();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderHeroRankings();
            initRankingTabs();
        });
    </script>
